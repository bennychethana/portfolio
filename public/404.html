<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chethana Benny</title>
    <!-- GitHub Pages has no SPA rewrite, so every unknown path hits this 404
         page. We stash the requested path in a query string and bounce to the
         app root; index.html decodes it back into a real route.
         pathSegmentsToKeep = 1 because the app is served from /portfolio/. -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
